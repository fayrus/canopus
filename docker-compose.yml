services:

  canopus:
    build: .
    ports:
      - "2107:2107"
    environment:
      CANOPUS_STORAGE_BACKEND: ${CANOPUS_STORAGE_BACKEND:-file}
      CANOPUS_DATABASE_URL:    ${CANOPUS_DATABASE_URL:-}
      CANOPUS_CIPHER:          ${CANOPUS_CIPHER:-f}
      CANOPUS_API_KEY:         ${CANOPUS_API_KEY:-}
      CANOPUS_DEBUG:           ${CANOPUS_DEBUG:-false}
    volumes:
      - canopus_data:/app/data
    env_file:
      - path: .env
        required: false

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  # Usage: docker compose --profile postgres up
  #        CANOPUS_STORAGE_BACKEND=database
  #        CANOPUS_DATABASE_URL=postgresql://canopus:canopus@postgres:5432/canopus
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       canopus
      POSTGRES_USER:     canopus
      POSTGRES_PASSWORD: canopus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U canopus"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles: [postgres]

  # ── MySQL ─────────────────────────────────────────────────────────────────────
  # Usage: docker compose --profile mysql up
  #        CANOPUS_STORAGE_BACKEND=database
  #        CANOPUS_DATABASE_URL=mysql+pymysql://canopus:canopus@mysql:3306/canopus
  mysql:
    image: mysql:8-debian
    environment:
      MYSQL_DATABASE:      canopus
      MYSQL_USER:          canopus
      MYSQL_PASSWORD:      canopus
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "canopus", "-pcanopus"]
      interval: 5s
      timeout: 5s
      retries: 10
    profiles: [mysql]

volumes:
  canopus_data:
  postgres_data:
  mysql_data:
